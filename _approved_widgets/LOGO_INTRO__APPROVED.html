<h2 class="sr-only">CHROMA 로고 인트로 애니메이션: O의 흰 별이 반짝 등장한 뒤 O를 기점으로 양옆으로 글자가 빠르게 펼쳐지며, 256 도트 픽셀 필터가 적용된 상태로 재생됩니다.</h2>
<div style="background:#05060d;border-radius:var(--border-radius-lg);padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;">
  <canvas id="lgcv" width="660" height="300" style="width:100%;height:auto;image-rendering:pixelated;border-radius:var(--border-radius-md);background:#05060d;"></canvas>
  <button id="lgrep" style="display:inline-flex;align-items:center;gap:6px;"><i class="ti ti-refresh" aria-hidden="true"></i>다시 재생</button>
</div>
<script>
(function(){
  var cv=document.getElementById("lgcv"),ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
  var full=document.createElement("canvas");full.width=W;full.height=H;var f=full.getContext("2d");
  var lo=document.createElement("canvas"),lc=lo.getContext("2d");
  var lh=170,lw=Math.round(lh*W/H);lo.width=lw;lo.height=lh;
  var BRAND=[[255,46,151],[34,167,255],[57,227,107],[255,210,63]];
  function slide(ph){var n=4,x=(((ph%1)+1)%1)*n,k0=Math.floor(x)%n,k1=(k0+1)%n,kk=x-Math.floor(x),a=BRAND[k0],b=BRAND[k1];return "rgb("+Math.round(a[0]+(b[0]-a[0])*kk)+","+Math.round(a[1]+(b[1]-a[1])*kk)+","+Math.round(a[2]+(b[2]-a[2])*kk)+")";}
  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function easeOutCubic(x){return 1-Math.pow(1-x,3);}
  function easeOutBack(x){var c1=1.70158,c3=c1+1;return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2);}
  function drawIntro(g,t){
    g.clearRect(0,0,W,H);g.fillStyle="#05060d";g.fillRect(0,0,W,H);
    var cx=W/2,ly=H*0.5,lsz=Math.min(W*0.15,H*0.34,104);
    var word="CHROMA",sp=lsz*0.94,eg=lsz*0.22;
    var xof=function(i){return i<3?i*sp:(i===3?3*sp+eg:i*sp+2*eg);};
    var startx=cx-(5*sp+2*eg)/2,gxO=startx+xof(3),oy=ly-lsz*0.06,r=lsz*0.43;
    var phO=t*0.13+3*0.12,colO=slide(phO);
    g.save();g.textAlign="center";g.textBaseline="middle";g.lineJoin="round";
    g.font="700 "+Math.round(lsz)+"px 'Century Gothic','Futura','Segoe UI',sans-serif";
    g.globalCompositeOperation="lighter";
    for(var i=0;i<6;i++){
      if(i===3)continue;
      var dist=Math.abs(i-3),stg=(dist-1)*0.06;
      var ls=clamp((t-0.5-stg)/0.3,0,1);if(ls<=0)continue;
      var e=easeOutCubic(ls),fxx=startx+xof(i),x=gxO+(fxx-gxO)*e,ph=t*0.13+i*0.12,col=slide(ph);
      g.shadowColor=col;g.shadowBlur=lsz*0.5;
      g.globalAlpha=ls*0.28;g.fillStyle=col;g.fillText(word[i],x,ly);
      g.globalAlpha=ls;g.lineWidth=lsz*0.085;g.strokeStyle=col;g.strokeText(word[i],x,ly);
    }
    g.globalAlpha=1;
    var ringA=clamp((t-0.45)/0.32,0,1);
    if(ringA>0){var grad=g.createLinearGradient(gxO-r,oy+r,gxO+r,oy-r);
      grad.addColorStop(0,slide(phO));grad.addColorStop(.5,slide(phO+0.18));grad.addColorStop(1,slide(phO+0.36));
      g.globalAlpha=ringA;g.shadowColor=colO;g.shadowBlur=lsz*0.45;g.lineWidth=lsz*0.1;g.strokeStyle=grad;g.beginPath();g.arc(gxO,oy,r,0,6.2832);g.stroke();g.globalAlpha=1;}
    var stT=clamp(t/0.5,0,1),starS=easeOutBack(stT),flash=Math.max(0,1-t/0.42);
    var R=r*0.62*starS;
    if(R>0.5){g.shadowColor="#fff";g.shadowBlur=lsz*0.3+flash*lsz*0.6;g.fillStyle="#fff";
      g.beginPath();g.moveTo(gxO,oy-R);g.quadraticCurveTo(gxO,oy,gxO+R,oy);g.quadraticCurveTo(gxO,oy,gxO,oy+R);g.quadraticCurveTo(gxO,oy,gxO-R,oy);g.quadraticCurveTo(gxO,oy,gxO,oy-R);g.closePath();g.fill();}
    if(flash>0){g.globalAlpha=flash*0.9;g.fillStyle="#fff";g.shadowColor="#fff";g.shadowBlur=lsz*0.7;g.beginPath();g.arc(gxO,oy,r*0.45*(1+(1-flash)*2.2),0,6.2832);g.fill();g.globalAlpha=1;}
    g.restore();
  }
  var t0=null,CYC=3.6;
  function frame(ms){
    if(t0==null)t0=ms;var t=((ms-t0)/1000);
    var tt=t%CYC,fade=tt>CYC-0.5?1-(tt-(CYC-0.5))/0.5:1;
    drawIntro(f,tt);
    lc.imageSmoothingEnabled=true;lc.clearRect(0,0,lw,lh);lc.globalAlpha=1;lc.drawImage(full,0,0,W,H,0,0,lw,lh);
    ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,W,H);ctx.globalAlpha=fade;ctx.drawImage(lo,0,0,lw,lh,0,0,W,H);ctx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  document.getElementById("lgrep").onclick=function(){t0=null;};
})();
</script>
