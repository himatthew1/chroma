<h2 class="sr-only">Animated CHROMA preview under the dot filter: Orb normal note with hit burst, Hex hold note charging, Meteor note with its hexagon note-points being consumed, and the Space note plus a proposed space pad.</h2>
<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px;">
  <canvas id="fxd" width="652" height="760" style="width:100%;height:auto;display:block;border-radius:var(--border-radius-md);image-rendering:pixelated;background:#05060d;"></canvas>
</div>
<script>
(function(){
  var cv=document.getElementById("fxd"),ctx=cv.getContext("2d");
  var W=cv.width,H=cv.height;
  var full=document.createElement("canvas");full.width=W;full.height=H;var f=full.getContext("2d");
  var lo=document.createElement("canvas"),lc=lo.getContext("2d");
  var COL=["#ff2e97","#22a7ff","#39e36b","#ffd23f"];
  var AUR=[[57,227,200],[111,240,160],[169,139,255],[255,143,208],[92,200,255]];
  function hexp(c,x,y,r,rot){c.beginPath();for(var i=0;i<6;i++){var a=(rot||-Math.PI/2)+i*Math.PI/3,px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;i?c.lineTo(px,py):c.moveTo(px,py);}c.closePath();}
  function star4(c,x,y,r,rot){c.save();c.translate(x,y);c.rotate(rot||0);c.beginPath();c.moveTo(0,-r);c.quadraticCurveTo(0,0,r,0);c.quadraticCurveTo(0,0,0,r);c.quadraticCurveTo(0,0,-r,0);c.quadraticCurveTo(0,0,0,-r);c.closePath();c.restore();}
  function rgba(a,al){return "rgba("+a[0]+","+a[1]+","+a[2]+","+al+")";}

  var P1=[],P2=[],P3=[];
  function step(arr){for(var i=arr.length-1;i>=0;i--){var p=arr[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.dec;if(p.life<=0)arr.splice(i,1);}}
  function drawP(c,arr){c.save();c.globalCompositeOperation="lighter";for(var i=0;i<arr.length;i++){var p=arr[i];c.globalAlpha=Math.max(0,p.life);c.fillStyle=p.white?"#fff":p.col;c.shadowColor=p.white?"#fff":p.col;c.shadowBlur=8;c.beginPath();c.arc(p.x,p.y,p.size*(0.4+p.life*0.7),0,6.283);c.fill();}c.restore();}
  function burst(arr,x,y,col,n){for(var i=0;i<n;i++){var a=Math.random()*6.283,s=2+Math.random()*7;arr.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3.5,life:1,dec:0.02+Math.random()*0.02,col:col,size:1.4+Math.random()*2.4,white:Math.random()<0.4});}}

  function orb(c,x,y,r,col,prog){var ease=prog*prog,ar=r*(1+(1-prog)*1.7);
    c.save();c.globalAlpha=0.4+prog*0.6;c.strokeStyle=col;c.shadowColor=col;c.shadowBlur=8;c.lineWidth=3+2*ease;c.beginPath();c.arc(x,y,ar,0,6.283);c.stroke();
    c.globalAlpha=1;c.shadowBlur=12+24*ease;c.lineWidth=3.5;c.beginPath();c.arc(x,y,r,0,6.283);c.stroke();
    c.fillStyle=col;c.shadowBlur=12;c.beginPath();c.arc(x,y,r*0.46,0,6.283);c.fill();
    c.fillStyle="#fff";c.shadowColor="#fff";c.shadowBlur=12;c.beginPath();c.arc(x,y,r*0.26,0,6.283);c.fill();c.restore();}

  function sec1(t){var cx=W*0.3,cy=130,r=26,T=2.2,cyc=t%T,prog=Math.min(1,cyc/1.2);
    if(s1.prev<1.2&&cyc>=1.2){burst(P1,cx,cy,COL[0],26);s1.flash=1;s1.judge=1;}
    s1.prev=cyc; if(cyc<0.05){s1.flash=0;s1.judge=0;}
    if(prog<1)orb(f,cx,cy,r,COL[0],prog);
    if(s1.flash>0){f.save();f.globalCompositeOperation="lighter";var fr=r*1.6*(1+(1-s1.flash));f.globalAlpha=s1.flash*0.8;var g=f.createRadialGradient(cx,cy,0,cx,cy,fr);g.addColorStop(0,"rgba(255,255,255,0.9)");g.addColorStop(1,"rgba(255,255,255,0)");f.fillStyle=g;f.beginPath();f.arc(cx,cy,fr,0,6.283);f.fill();f.restore();s1.flash-=0.05;}
    step(P1);drawP(f,P1);
    if(s1.judge>0){f.save();f.globalAlpha=s1.judge;f.fillStyle="#39e36b";f.shadowColor="#39e36b";f.shadowBlur=10;f.font="bold 20px monospace";f.textAlign="center";f.fillText("PERFECT",cx,cy-r-22);f.restore();s1.judge-=0.012;}
  }
  function sec2(t){var cx=W*0.3,cy=300,r=26,T=2.6,cyc=t%T,s=Math.max(0,Math.min(1,(cyc-0.3)/1.6)),col=COL[1];
    var holding=cyc>0.3&&cyc<1.9;
    var bx=cx,by=cy,bsz=r*(1+s*0.5),wh=0.3+s*0.55;
    if(holding){bx+=(Math.random()-0.5)*s*s*6;by+=(Math.random()-0.5)*s*s*6;
      for(var k=0;k<2+Math.floor(s*4);k++){var ang=Math.random()*6.283;P2.push({x:bx,y:by,vx:Math.cos(ang)*(1+s*3),vy:Math.sin(ang)*(1+s*3)-1.2,life:1,dec:0.04+Math.random()*0.03,col:col,size:1+Math.random()*(1.4+s*1.6),white:Math.random()<s*0.5});}}
    if(s2.prev>=1.9&&!(cyc>=1.9)){} if(s2.prev<1.9&&cyc>=1.9){burst(P2,cx,cy,col,24);s2.flash=1;}
    s2.prev=cyc;
    f.save();c=f;f.shadowColor=col;f.shadowBlur=16+s*40;
    f.globalAlpha=0.2;f.fillStyle=col;hexp(f,bx,by,bsz*1.3);f.fill();
    f.globalAlpha=0.9;f.shadowBlur=12+s*30;hexp(f,bx,by,bsz);f.fill();
    f.globalAlpha=0.6;f.strokeStyle="#fff";f.lineWidth=2;hexp(f,bx,by,bsz);f.stroke();
    f.globalAlpha=Math.min(1,wh);f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=12;hexp(f,bx,by,bsz*(0.4+wh*0.25));f.fill();f.restore();
    if(s2.flash>0){f.save();f.globalCompositeOperation="lighter";f.globalAlpha=s2.flash*0.8;f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=30;f.beginPath();f.arc(cx,cy,bsz*1.3*s2.flash+6,0,6.283);f.fill();f.restore();s2.flash-=0.05;}
    step(P2);drawP(f,P2);
  }
  function sec3(t){var y=460,x0=W*0.12,x1=W*0.88,col=COL[2],T=3.0,cyc=(t%T)/T;
    var pts=[];for(var i=0;i<=5;i++){var fx=i/5,px=x0+(x1-x0)*fx,py=y+Math.sin(fx*Math.PI*2)*34;pts.push({x:px,y:py,fr:fx});}
    f.save();f.globalCompositeOperation="lighter";f.strokeStyle=col;f.shadowColor=col;f.shadowBlur=6;f.globalAlpha=0.18;f.lineWidth=3;f.beginPath();pts.forEach(function(p,i){i?f.lineTo(p.x,p.y):f.moveTo(p.x,p.y);});f.stroke();f.restore();
    var head=cyc;
    pts.forEach(function(p,j){var hue=AUR[j%5],consumed=head>p.fr;
      f.save();f.globalCompositeOperation="lighter";
      if(!consumed){f.globalAlpha=0.85;f.strokeStyle=col;f.shadowColor=col;f.shadowBlur=10;f.lineWidth=2;hexp(f,p.x,p.y,9);f.stroke();
        f.globalAlpha=0.95;f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=7;f.beginPath();f.arc(p.x,p.y,3,0,6.283);f.fill();
        f.globalAlpha=0.3;f.strokeStyle=rgba(hue,1);f.shadowColor=rgba(hue,1);hexp(f,p.x,p.y,9);f.stroke();}
      else{var ff=Math.min(1,(head-p.fr)*4);if(ff<1){f.globalAlpha=1-ff;f.strokeStyle="#fff";f.shadowColor=rgba(hue,1);f.shadowBlur=16;f.lineWidth=2.4;hexp(f,p.x,p.y,9+ff*22);f.stroke();}}
      f.restore();});
    var hp={x:x0+(x1-x0)*head,y:y+Math.sin(head*Math.PI*2)*34};
    f.save();f.globalCompositeOperation="lighter";f.shadowColor=col;f.shadowBlur=20;f.fillStyle=col;star4(f,hp.x,hp.y,22,t*3);f.fill();f.beginPath();f.fill();
    f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=14;star4(f,hp.x,hp.y,12,t*3);f.fill();f.beginPath();f.fill();f.restore();
  }
  function sec4(t){var cx=W*0.30,cy=600,R=58,spin=t*0.6,pulse=0.5+0.5*Math.sin(t*3);
    var cg=f.createConicGradient(-1.5708+spin,cx,cy);for(var i=0;i<6;i++)cg.addColorStop(i/5,rgba(AUR[[0,1,2,3,4,0][i]],1));
    f.save();f.globalCompositeOperation="lighter";f.strokeStyle=cg;f.globalAlpha=0.25;f.lineWidth=R*0.2;f.beginPath();f.arc(cx,cy,R,0,6.283);f.stroke();
    f.globalAlpha=0.9;f.lineWidth=R*0.09;f.beginPath();f.arc(cx,cy,R,0,6.283);f.stroke();f.restore();
    f.save();f.globalAlpha=0.95;f.strokeStyle="#f2f6ff";f.lineWidth=R*0.06;f.beginPath();f.arc(cx,cy,R,0,6.283);f.stroke();
    f.globalAlpha=0.7;f.lineWidth=R*0.04;f.beginPath();f.arc(cx,cy,R*0.6,0,6.283);f.stroke();f.restore();
    f.save();f.globalAlpha=0.1+0.4*pulse;f.strokeStyle="#e6efff";f.lineWidth=3;f.beginPath();f.arc(cx,cy,R*(1.1+(1-pulse)*0.8),0,6.283);f.stroke();f.restore();
    var py=700,pr=20,xs=[W*0.62,W*0.71,W*0.80,W*0.89],lit=0.5+0.5*Math.sin(t*3);
    var arcg=f.createLinearGradient(xs[0]-pr,0,xs[3]+pr,0);for(var k=0;k<5;k++)arcg.addColorStop(k/4,rgba(AUR[k],1));
    f.save();f.globalCompositeOperation="lighter";f.strokeStyle=arcg;f.globalAlpha=0.5+0.4*lit;f.lineWidth=4;f.shadowBlur=12;f.beginPath();f.moveTo(xs[0],py-pr-14);f.quadraticCurveTo((xs[0]+xs[3])/2,py-pr-30,xs[3],py-pr-14);f.stroke();f.restore();
    for(var i=0;i<4;i++){f.save();f.strokeStyle=rgba(AUR[i],1);f.shadowColor=rgba(AUR[i],1);f.shadowBlur=14+10*lit;f.globalAlpha=0.6+0.4*lit;f.lineWidth=3;f.beginPath();f.arc(xs[i],py,pr,0,6.283);f.stroke();f.globalAlpha=0.3+0.4*lit;f.beginPath();f.arc(xs[i],py,pr*0.72,0,6.283);f.stroke();f.restore();}
  }
  var s1={prev:0,flash:0,judge:0},s2={prev:0,flash:0};
  function labels(c){c.save();c.fillStyle="#dfe6ff";c.textAlign="left";c.font="13px sans-serif";
    c.fillText("Normal (Orb) — approach then HIT burst",16,30);
    c.fillText("Hold (Hex) — press & hold: shakes, grows, sparks",16,210);
    c.fillText("Meteor (drag) — star head draws hexagon note-points, consumes them",16,378);
    c.fillText("Space note (aurora ring)        +  proposed Space pad (hit all 4)",16,545);
    c.restore();}
  function loop(ms){var t=(ms||0)/1000;
    f.clearRect(0,0,W,H);f.fillStyle="#05060d";f.fillRect(0,0,W,H);
    f.fillStyle="rgba(150,160,200,0.14)";for(var gy=180;gy<H;gy+=180){f.fillRect(0,gy,W,1);} 
    sec1(t);sec2(t);sec3(t);sec4(t);
    var lh=170,lw=Math.round(lh*W/H);if(lo.width!==lw||lo.height!==lh){lo.width=lw;lo.height=lh;}
    lc.imageSmoothingEnabled=true;lc.clearRect(0,0,lw,lh);lc.drawImage(full,0,0,W,H,0,0,lw,lh);
    ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,W,H);ctx.drawImage(lo,0,0,lw,lh,0,0,W,H);ctx.imageSmoothingEnabled=true;
    labels(ctx);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
