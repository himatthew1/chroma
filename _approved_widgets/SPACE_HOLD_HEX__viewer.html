<h2 class="sr-only">CHROMA viewer v4: space hold is now a hexagon, and the space pad is a curved futuristic cockpit-console lens below the four pads.</h2>
<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px;">
  <div id="ab5" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;color:var(--color-text-secondary);"><span>Dot filter</span><div id="fb5" style="display:flex;gap:6px;"></div></div>
  <canvas id="av5" width="652" height="540" style="width:100%;height:auto;display:block;border-radius:var(--border-radius-md);image-rendering:pixelated;background:#05060d;"></canvas>
</div>
<script>
(function(){
  var cv=document.getElementById("av5"),ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
  var full=document.createElement("canvas");full.width=W;full.height=H;var f=full.getContext("2d");
  var lo=document.createElement("canvas"),lc=lo.getContext("2d");
  var COL=["#ff2e97","#22a7ff","#39e36b","#ffd23f"];
  var AUR=[[57,227,200],[111,240,160],[169,139,255],[255,143,208],[92,200,255]];
  var assets=[["normal","Normal (Orb)"],["hold","Hold (Hex)"],["meteor","Meteor"],["space","Space note"],["spacehold","Space HOLD (hex)"],["pads","Pads A D J L"],["spacepad","Space pad"]];
  var st={asset:"spacepad",fx:true,P:[],S:[],prev:0,prev2:0,flash:0,judge:0,cons:{}};
  function rgba(a,al){return "rgba("+a[0]+","+a[1]+","+a[2]+","+al+")";}
  function reset(){st.P=[];st.S=[];st.prev=0;st.prev2=0;st.flash=0;st.judge=0;st.cons={};}
  function mk(id,opts,key,cb){var b=document.getElementById(id);b.innerHTML="";opts.forEach(function(o){var v=o[0],lab=o[1];var bt=document.createElement("button");bt.textContent=lab;bt.style.cssText="font-size:12px;padding:6px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:"+(String(st[key])===String(v)?"var(--color-background-primary)":"transparent")+";cursor:pointer;color:var(--color-text-primary);";bt.onclick=function(){cb(v);mk(id,opts,key,cb);};b.appendChild(bt);});}
  mk("ab5",assets,"asset",function(v){st.asset=v;reset();});
  mk("fb5",[["true","On"],["false","Off"]],"fx",function(v){st.fx=(v==="true");});
  function hexp(c,x,y,r,rot){c.beginPath();for(var i=0;i<6;i++){var a=(rot||-Math.PI/2)+i*Math.PI/3;i?c.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r):c.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}c.closePath();}
  function star4(c,x,y,r,rot){c.save();c.translate(x,y);c.rotate(rot||0);c.beginPath();c.moveTo(0,-r);c.quadraticCurveTo(0,0,r,0);c.quadraticCurveTo(0,0,0,r);c.quadraticCurveTo(0,0,-r,0);c.quadraticCurveTo(0,0,0,-r);c.closePath();c.restore();}
  function step(){var i,p,s;for(i=st.P.length-1;i>=0;i--){p=st.P[i];p.px=p.x;p.py=p.y;p.x+=p.vx;p.y+=p.vy;p.vy+=(p.g===undefined?0.12:p.g);p.life-=p.dec;if(p.life<=0)st.P.splice(i,1);}for(i=st.S.length-1;i>=0;i--){s=st.S[i];s.r+=s.vr;s.vr*=0.96;s.life-=s.dec;if(s.life<=0)st.S.splice(i,1);}}
  function drawP(){f.save();f.globalCompositeOperation="lighter";f.lineCap="round";for(var i=0;i<st.P.length;i++){var p=st.P[i],cc=p.white?"#fff":p.col;f.globalAlpha=Math.max(0,p.life);f.shadowColor=cc;f.shadowBlur=10;if(p.streak){f.strokeStyle=cc;f.lineWidth=p.size;f.beginPath();f.moveTo(p.px,p.py);f.lineTo(p.x,p.y);f.stroke();}else{f.fillStyle=cc;f.beginPath();f.arc(p.x,p.y,p.size*(0.4+p.life*0.7),0,6.283);f.fill();}}f.restore();}
  function drawS(){f.save();f.globalCompositeOperation="lighter";for(var i=0;i<st.S.length;i++){var s=st.S[i];f.globalAlpha=s.life*0.85;f.strokeStyle=s.col;f.shadowColor=s.col;f.shadowBlur=16;f.lineWidth=5*s.life+1;f.beginPath();f.arc(s.x,s.y,s.r,0,6.283);f.stroke();}f.restore();}
  function shock(x,y,col,vr){st.S.push({x:x,y:y,r:8,vr:vr||9,life:1,dec:0.035,col:col});}
  function burst(x,y,col,n){for(var i=0;i<n;i++){var a=Math.random()*6.283,sp=4+Math.random()*11;st.P.push({x:x,y:y,px:x,py:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,dec:0.016+Math.random()*0.02,col:col,size:1.6+Math.random()*2.6,streak:Math.random()<0.6});}for(var k=0;k<Math.ceil(n*0.35);k++){var a2=Math.random()*6.283,sp2=1+Math.random()*5;st.P.push({x:x,y:y,px:x,py:y,vx:Math.cos(a2)*sp2,vy:Math.sin(a2)*sp2,life:1,dec:0.05+Math.random()*0.03,col:col,size:1.6+Math.random()*2,white:true});}}
  function burstAur(x,y,n,fast){var m=fast||1;for(var i=0;i<n;i++){var a=Math.random()*6.283,sp=(5+Math.random()*13)*m;st.P.push({x:x,y:y,px:x,py:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:0.04,life:1,dec:0.014+Math.random()*0.018,col:rgba(AUR[(Math.random()*5)|0],1),size:1.6+Math.random()*2.8,streak:Math.random()<0.7});}for(var k=0;k<Math.ceil(n*0.4);k++){var a2=Math.random()*6.283,sp2=(1.5+Math.random()*6)*m;st.P.push({x:x,y:y,px:x,py:y,vx:Math.cos(a2)*sp2,vy:Math.sin(a2)*sp2,g:0.04,life:1,dec:0.045,col:"#fff",size:1.8,white:true});}}
  function flashAt(x,y,r,al){f.save();f.globalCompositeOperation="lighter";f.globalAlpha=al;var g=f.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,"rgba(255,255,255,0.9)");g.addColorStop(1,"rgba(255,255,255,0)");f.fillStyle=g;f.beginPath();f.arc(x,y,r,0,6.283);f.fill();f.restore();}
  function label(txt){f.save();f.fillStyle="rgba(220,228,255,0.72)";f.font="16px monospace";f.textAlign="center";f.fillText(txt,W/2,H*0.95);f.restore();}
  var CX=W/2,CY=H*0.42;

  function aNormal(t){var r=52,T=2.2,cyc=t%T,prog=Math.min(1,cyc/1.2),ease=prog*prog,gp=Math.pow(prog,1.6),ar=r*(1+(1-prog)*1.8),sc=0.15+0.85*gp,col=COL[0];
    if(st.prev<1.2&&cyc>=1.2){burst(CX,CY,col,34);shock(CX,CY,col);st.flash=1;st.judge=1;}st.prev=cyc;
    if(prog<1){var rr=r*sc;f.save();f.globalAlpha=0.4+prog*0.6;f.strokeStyle=col;f.shadowColor=col;f.shadowBlur=10;f.lineWidth=4+3*ease;f.beginPath();f.arc(CX,CY,ar,0,6.283);f.stroke();f.globalAlpha=1;f.shadowBlur=16+30*ease;f.lineWidth=5;f.beginPath();f.arc(CX,CY,rr,0,6.283);f.stroke();f.fillStyle=col;f.shadowBlur=16;f.beginPath();f.arc(CX,CY,rr*0.46,0,6.283);f.fill();f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=16;f.beginPath();f.arc(CX,CY,rr*0.26,0,6.283);f.fill();f.restore();}
    if(st.flash>0){flashAt(CX,CY,r*1.8*(2-st.flash),st.flash*0.8);st.flash-=0.045;}
    if(st.judge>0){f.save();f.globalAlpha=st.judge;f.fillStyle="#39e36b";f.shadowColor="#39e36b";f.shadowBlur=14;f.font="bold 34px monospace";f.textAlign="center";f.fillText("PERFECT",CX,CY-r-30);f.restore();st.judge-=0.01;}
    label("spawns small -> accelerates in -> HIT burst");}
  function aHold(t){var r=52,T=2.8,cyc=t%T,col=COL[1];var approaching=cyc<0.6,holding=cyc>=0.6&&cyc<2.0;
    if(st.prev<2.0&&cyc>=2.0){burst(CX,CY,col,38);shock(CX,CY,col);st.flash=1;}st.prev=cyc;
    if(approaching){var prog=cyc/0.6,ease=prog*prog,gp=Math.pow(prog,1.6),ar=r*(1+(1-prog)*1.9),sc=0.15+0.85*gp;
      f.save();f.globalAlpha=0.35+prog*0.6;f.strokeStyle=col;f.shadowColor=col;f.shadowBlur=10;f.lineWidth=3+3*ease;hexp(f,CX,CY,ar);f.stroke();f.restore();
      f.save();f.shadowColor=col;f.shadowBlur=16;f.globalAlpha=0.9;f.fillStyle=col;hexp(f,CX,CY,r*sc);f.fill();f.globalAlpha=0.6;f.strokeStyle="#fff";f.lineWidth=3;hexp(f,CX,CY,r*sc);f.stroke();f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=12;hexp(f,CX,CY,r*sc*0.4);f.fill();f.restore();}
    else if(holding){var s=Math.min(1,(cyc-0.6)/1.4),bsz=r*(1+s*0.5),wh=0.3+s*0.55,bx=CX+(Math.random()-0.5)*s*s*9,by=CY+(Math.random()-0.5)*s*s*9;
      for(var k=0;k<2+Math.floor(s*6);k++){var ang=Math.random()*6.283;st.P.push({x:bx,y:by,px:bx,py:by,vx:Math.cos(ang)*(1+s*4),vy:Math.sin(ang)*(1+s*4)-1.5,life:1,dec:0.035+Math.random()*0.03,col:col,size:1.4+Math.random()*(1.6+s*2),streak:Math.random()<0.45,white:Math.random()<s*0.5});}
      f.save();f.shadowColor=col;f.shadowBlur=18+s*48;f.globalAlpha=0.2;f.fillStyle=col;hexp(f,bx,by,bsz*1.3);f.fill();f.globalAlpha=0.92;f.shadowBlur=14+s*36;hexp(f,bx,by,bsz);f.fill();f.globalAlpha=0.6;f.strokeStyle="#fff";f.lineWidth=3;hexp(f,bx,by,bsz);f.stroke();f.globalAlpha=Math.min(1,wh);f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=16;hexp(f,bx,by,bsz*(0.4+wh*0.25));f.fill();f.restore();}
    if(st.flash>0){flashAt(CX,CY,r*1.8*(2-st.flash),st.flash*0.85);st.flash-=0.045;}
    label(approaching?"approach ring -> catch":(holding?"hold: shakes, grows, sparks":"RELEASE -> supernova"));}
  function ptXY(fr,x0,x1,y){return {x:x0+(x1-x0)*fr,y:y+Math.sin(fr*Math.PI*2)*72};}
  function drawPoint(p,al){f.save();f.globalCompositeOperation="lighter";f.globalAlpha=al;f.strokeStyle=COL[2];f.shadowColor=COL[2];f.shadowBlur=12;f.lineWidth=3;hexp(f,p.x,p.y,16);f.stroke();f.globalAlpha=al*0.95;f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=9;f.beginPath();f.arc(p.x,p.y,5,0,6.283);f.fill();f.globalAlpha=al*0.3;f.strokeStyle=rgba(p.hue,1);f.shadowColor=rgba(p.hue,1);hexp(f,p.x,p.y,16);f.stroke();f.restore();}
  function ignite(p){var h=rgba(p.hue,1);for(var i=0;i<18;i++){var a=Math.random()*6.283,sp=2.5+Math.random()*7;st.P.push({x:p.x,y:p.y,px:p.x,py:p.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,dec:0.028+Math.random()*0.03,col:h,size:1.5+Math.random()*2.4,streak:Math.random()<0.6,white:Math.random()<0.3});}st.S.push({x:p.x,y:p.y,r:10,vr:6,life:1,dec:0.05,col:h});st.S.push({x:p.x,y:p.y,r:6,vr:4,life:1,dec:0.06,col:"#ffffff"});}
  function aMeteor(t){var col=COL[2],x0=W*0.12,x1=W*0.88,y=CY,T=4.0,cyc=(t%T)/T,A=0.42;if(cyc<0.02){st.cons={};st.prev2=0;}
    var pts=[];for(var i=0;i<=5;i++){var q=ptXY(i/5,x0,x1,y);pts.push({fr:i/5,hue:AUR[i%5],x:q.x,y:q.y});}
    if(cyc<A){var ca=cyc/A,comet=ptXY(ca,x0,x1,y);
      f.save();f.globalCompositeOperation="lighter";f.strokeStyle=col;f.shadowColor=col;f.shadowBlur=6;f.globalAlpha=0.2;f.lineWidth=4;f.beginPath();for(var q3=0;q3<=40;q3++){var pp=ptXY(ca*q3/40,x0,x1,y);q3?f.lineTo(pp.x,pp.y):f.moveTo(pp.x,pp.y);}f.stroke();f.restore();
      pts.forEach(function(p){if(p.fr<=ca+0.001)drawPoint(p,1);});
      f.save();f.globalCompositeOperation="lighter";f.shadowColor=col;f.shadowBlur=20;f.fillStyle=col;star4(f,comet.x,comet.y,24,t*5);f.fill();f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=14;star4(f,comet.x,comet.y,12,t*5);f.fill();f.restore();
      if(st.prev<1&&ca>=0.999){st.flash=1;}st.prev=ca;if(st.flash>0){flashAt(x1,ptXY(1,x0,x1,y).y,60*(2-st.flash),st.flash*0.7);st.flash-=0.07;}
      label("1) comet draws path + stamps note-points -> head");
    } else {var cr=(cyc-A)/(1-A),headFr=1-cr;
      f.save();f.globalCompositeOperation="lighter";f.strokeStyle=col;f.shadowColor=col;f.shadowBlur=6;f.globalAlpha=0.14;f.lineWidth=4;f.beginPath();for(var q2=0;q2<=40;q2++){var pp2=ptXY(q2/40,x0,x1,y);q2?f.lineTo(pp2.x,pp2.y):f.moveTo(pp2.x,pp2.y);}f.stroke();f.restore();
      pts.forEach(function(p){if(headFr<=p.fr+0.001){if(!st.cons[p.fr]){st.cons[p.fr]=true;ignite(p);}}else{drawPoint(p,1);}});
      if(headFr>0.001){var sp2=ptXY(headFr,x0,x1,y);f.save();f.globalCompositeOperation="lighter";f.shadowColor=col;f.shadowBlur=26;f.fillStyle=col;star4(f,sp2.x,sp2.y,40,-t*6);f.fill();f.fillStyle="#fff";f.shadowColor="#fff";f.shadowBlur=18;star4(f,sp2.x,sp2.y,22,-t*6);f.fill();f.restore();}
      else if(st.prev2<1){burst(x0,ptXY(0,x0,x1,y).y,col,30);shock(x0,ptXY(0,x0,x1,y).y,col);st.prev2=1;}
      label("2) note REVERSES along the path, igniting each point");}}
  function spConic(cx,cy,spin){var cg=f.createConicGradient(-1.5708+spin,cx,cy);for(var i=0;i<6;i++)cg.addColorStop(i/5,rgba(AUR[[0,1,2,3,4,0][i]],1));return cg;}
  function spRing(cx,cy,R,spin,al){var cg=spConic(cx,cy,spin);f.save();f.globalCompositeOperation="lighter";f.strokeStyle=cg;f.globalAlpha=0.25*al;f.lineWidth=R*0.2;f.beginPath();f.arc(cx,cy,R,0,6.283);f.stroke();f.globalAlpha=0.9*al;f.lineWidth=R*0.09;f.beginPath();f.arc(cx,cy,R,0,6.283);f.stroke();f.restore();f.save();f.globalAlpha=0.95*al;f.strokeStyle="#f2f6ff";f.lineWidth=R*0.06;f.beginPath();f.arc(cx,cy,R,0,6.283);f.stroke();f.globalAlpha=0.7*al;f.lineWidth=R*0.04;f.beginPath();f.arc(cx,cy,R*0.6,0,6.283);f.stroke();f.restore();}
  function spHex(cx,cy,R,spin,al){var cg=spConic(cx,cy,spin);f.save();f.globalCompositeOperation="lighter";f.strokeStyle=cg;f.globalAlpha=0.25*al;f.lineWidth=R*0.2;hexp(f,cx,cy,R,spin);f.stroke();f.globalAlpha=0.9*al;f.lineWidth=R*0.09;hexp(f,cx,cy,R,spin);f.stroke();f.restore();f.save();f.globalAlpha=0.95*al;f.strokeStyle="#f2f6ff";f.lineWidth=R*0.06;hexp(f,cx,cy,R,spin);f.stroke();f.globalAlpha=0.7*al;f.lineWidth=R*0.04;hexp(f,cx,cy,R*0.6,spin);f.stroke();f.restore();}
  function aSpace(t){var R=112,T=2.6,cyc=t%T,spin=t*0.7,HIT=1.35;
    if(st.prev<HIT&&cyc>=HIT){burstAur(CX,CY,64,1.25);shock(CX,CY,"#bfeaff",18);shock(CX,CY,"#cfe6ff",12);st.flash=1;}st.prev=cyc;
    if(cyc<HIT){var pr=cyc/HIT,gp=Math.pow(pr,1.9),rs=0.08+0.92*gp,al=Math.min(1,pr/0.4);
      var ar=R*(0.5+(1-pr)*2.2);f.save();f.globalCompositeOperation="lighter";f.globalAlpha=(0.08+0.7*pr);f.strokeStyle="#e6efff";f.shadowColor="#cfe6ff";f.shadowBlur=12;f.lineWidth=2+5*pr;f.beginPath();f.arc(CX,CY,ar,0,6.283);f.stroke();f.restore();
      spRing(CX,CY,R*rs,spin,al);label("TAP space = circle ring (spawn -> rush in)");
    } else {var r2=(cyc-HIT)/(T-HIT),eo=1-(1-r2)*(1-r2),rs2=1+6.8*eo,al2=Math.max(0,1-r2*1.15);if(al2>0)spRing(CX,CY,R*rs2,spin,al2);label("HIT: ring blasts out + aurora particles");}
    if(st.flash>0){flashAt(CX,CY,R*1.8*(2-st.flash),st.flash*0.6);st.flash-=0.05;}}
  function aSpaceHold(t){var R=112,T=3.6,cyc=t%T,s=Math.max(0,Math.min(1,(cyc-0.3)/2.0)),spin=t*0.6,eased=s*s*(3-2*s),charging=cyc<2.6,spawn=Math.min(1,cyc/0.4);
    if(st.prev<2.6&&cyc>=2.6){burstAur(CX,CY,56,1.3);shock(CX,CY,"#bfeaff",16);st.flash=1;}st.prev=cyc;
    if(charging){var rr=R*(0.3+0.7*spawn)*(1+eased*0.35),ox=CX+(Math.random()-0.5)*s*s*7,oy=CY+(Math.random()-0.5)*s*s*7;
      if(s>0.3&&Math.random()<s*s*0.7){var a=Math.random()*6.283,rd=rr*(0.5+Math.random()*0.5);st.P.push({x:CX+Math.cos(a)*rd,y:CY+Math.sin(a)*rd,px:CX,py:CY,vx:Math.cos(a)*(0.5+s*2),vy:Math.sin(a)*(0.5+s*2),g:0.02,life:1,dec:0.016+Math.random()*0.02,col:rgba(AUR[(Math.random()*5)|0],1),size:1.4+Math.random()*2,white:Math.random()<0.5});}
      f.save();f.globalCompositeOperation="lighter";var halo=rr*(1.1+eased*2)+s*50,hg=f.createRadialGradient(ox,oy,0,ox,oy,halo);hg.addColorStop(0,"rgba(255,255,255,"+(0.16+0.34*s)+")");hg.addColorStop(0.4,rgba(AUR[2],0.16*s));hg.addColorStop(1,"rgba(90,120,255,0)");f.fillStyle=hg;f.beginPath();f.arc(ox,oy,halo,0,6.283);f.fill();f.restore();
      for(var k=0;k<3;k++){var ph=((t*0.7)+k/3)%1,ringR=rr*(0.98-ph*0.48);f.save();f.globalCompositeOperation="lighter";f.globalAlpha=Math.sin(ph*Math.PI)*0.45*s;f.strokeStyle=rgba(AUR[(k+1)%5],1);f.lineWidth=R*0.05;hexp(f,ox,oy,ringR,spin);f.stroke();f.restore();}
      spHex(ox,oy,rr,spin,Math.min(1,spawn+0.2));}
    if(st.flash>0){flashAt(CX,CY,R*1.9*(2-st.flash),st.flash*0.6);st.flash-=0.035;}label("HOLD space = HEXAGON (charges -> aurora supernova)");}
  function ringPad(x,y,r,col,letter,press){f.save();f.shadowColor=col;f.shadowBlur=press?44:18;f.strokeStyle=col;f.lineWidth=3.5;f.globalAlpha=press?0.95:0.5;f.beginPath();f.arc(x,y,r,0,6.283);f.stroke();f.globalAlpha=press?0.7:0.3;f.lineWidth=3;f.beginPath();f.arc(x,y,r*0.72,0,6.283);f.stroke();var rg=f.createRadialGradient(x,y,2,x,y,r*0.7);rg.addColorStop(0,col);rg.addColorStop(1,"transparent");f.globalAlpha=press?0.9:0.3;f.fillStyle=rg;f.beginPath();f.arc(x,y,r*0.7,0,6.283);f.fill();f.globalAlpha=1;f.fillStyle="#fff";f.textAlign="center";f.textBaseline="middle";f.font="bold "+Math.round(r*0.95)+"px monospace";f.lineJoin="round";f.lineWidth=Math.max(3,r*0.2);f.strokeStyle="#05070f";f.strokeText(letter,x,y);f.fillText(letter,x,y);f.textBaseline="alphabetic";f.restore();}
  function aPads(t){var r=54,xs=[W*0.2,W*0.4,W*0.6,W*0.8],nm=["A","D","J","L"],active=Math.floor(t*1.8)%4;if(st.prev!==active){burst(xs[active],CY,COL[active],16);shock(xs[active],CY,COL[active]);}st.prev=active;for(var i=0;i<4;i++)ringPad(xs[i],CY,r,COL[i],nm[i],i===active);label("press = pad glow + particle burst");}
  function cockpit(sy,sw,sh,bulge){var sx=CX-sw/2,ex=CX+sw/2;f.beginPath();f.moveTo(sx,sy);f.quadraticCurveTo(CX,sy-bulge,ex,sy);f.quadraticCurveTo(CX,sy+bulge*0.7,sx,sy);f.closePath();}
  function aSpacePad(t){var r=40,xs=[W*0.2,W*0.4,W*0.6,W*0.8],nm=["A","D","J","L"],py=H*0.30,active=Math.floor(t*1.8)%5,press=(active===4);
    for(var i=0;i<4;i++)ringPad(xs[i],py,r,COL[i],nm[i],i===active);
